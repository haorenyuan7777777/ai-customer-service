# configs/models.yaml
# 模型配置

llm:
  vllm:
    base_url: "http://localhost:8000/v1"
    model: "Qwen/Qwen2.5-1.5B"
    device: "cuda"
    max_tokens: 512
    temperature: 0.7
    top_p: 0.9
    context_limit: 2048

embedding:
  bge_small_zh:
    model_path: "/mnt/e/modelscope/BAAI/bge-small-zh"  
    device: "cuda"
    normalize: true
    batch_size: 64

intent:
  bert_base_chinese:
    model_path: "/mnt/e/modelscope/google-bert/bert-base-chinese"  
    device: "cuda"
    max_length: 128
    num_labels: 4  # 4类意图