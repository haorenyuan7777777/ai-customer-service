# flows/flow.dag.yaml
# Promptflow DAG流程定义

inputs:
  user_message:
    type: string
    default: ""
  user_id:
    type: string
    default: "anonymous"
  session_id:
    type: string
    default: "default"

nodes:
  - name: detect_intent
    type: python
    source:
      type: code
      path: nodes/detect_intent.py
    inputs:
      message: ${inputs.user_message}

  - name: load_memory
    type: python
    source:
      type: code
      path: nodes/load_memory.py
    inputs:
      user_id: ${inputs.user_id}
      session_id: ${inputs.session_id}
      max_turns: 3

  - name: retrieve_knowledge
    type: python
    source:
      type: code
      path: nodes/retrieve_knowledge.py
    inputs:
      query: ${inputs.user_message}
      intent: ${detect_intent.intent}
      category: ${detect_intent.category}

  - name: assemble_prompt
    type: python
    source:
      type: code
      path: nodes/assemble_prompt.py
    inputs:
      user_message: ${inputs.user_message}
      intent: ${detect_intent}          
      memory: ${load_memory}             
      context: ${retrieve_knowledge}     

  - name: generate_response
    type: llm
    source:
      type: code
      path: nodes/generate_response.py
    inputs:
      prompt: ${assemble_prompt}        
      max_tokens: 512

  - name: save_memory
    type: python
    source:
      type: code
      path: nodes/save_memory.py
    inputs:
      user_id: ${inputs.user_id}
      session_id: ${inputs.session_id}
      user_message: ${inputs.user_message}
      assistant_message: ${generate_response}  

outputs:
  response: ${generate_response}           
  intent: ${detect_intent.intent}         
  category: ${detect_intent.category}     
  context_used: ${retrieve_knowledge}     



